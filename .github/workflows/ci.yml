name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Type Check
        run: npm run type-check
      - name: Lint
        run: npm run lint
      - name: Format Check
        run: npm run format:check
      - name: Run Tests
        run: npm test
